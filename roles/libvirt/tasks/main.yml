---

- name: install packages
  dnf:
    name: '{{ libvirt_packages }}'
    state: present
  become: yes
  tags:
  - libvirt

- name: add user to groups
  user:
    name: '{{ username }}'
    groups: libvirt
    append: yes
  become: yes
  tags:
  - libvirt

- name: start and enable service
  service:
    name: libvirtd
    state: started
    enabled: yes
  become: yes
  tags:
  - libvirt

- include_tasks: pools.yml
